<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video Player</title>
    <style>
        body {
            background: #181818;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px 0;
        }
        .video-container {
            max-width: 800px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
            border-radius: 8px;
            overflow: hidden;
            background: #222;
        }
        video {
            width: 100%;
            height: auto;
            display: block;
            background: #000;
        }
        .back-button {
            display: inline-block;
            margin-bottom: 20px;
            padding: 12px 24px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.3);
        }
        .back-button:hover {
            background: #1d4ed8;
            transform: translateX(-5px);
            box-shadow: 0 6px 12px rgba(37, 99, 235, 0.4);
        }
        .back-button:focus {
            outline: 3px solid #2563eb;
            outline-offset: 3px;
        }

        .back-link {
            display: inline-block;
            padding: 12px 24px;
            background: #4a9eff;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .back-link:hover {
            background: #357abd;
        }

        .back-link:focus {
            outline: 2px solid #4a9eff;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-button" aria-label="Back to portfolio">← Back to Portfolio</a>
    <h1>Video Player</h1>
    <div class="video-container">
        <video controls>
            <source src="swiss.mp4" type="video/webm">
            Your browser does not support the video tag.
        </video>
    </div>
    <!-- Footer -->
    <footer role="contentinfo">
        <a href="index.html" class="back-link" aria-label="Return to portfolio homepage">← Back to Portfolio</a>
    </footer>
</body>
</html>
